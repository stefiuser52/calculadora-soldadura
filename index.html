<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ezequiel Palacios - Presupuestos</title>
    <style>
        :root { --verde: #2d5a27; --oscuro: #1a1a1a; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #e0e0e0; margin: 0; padding: 10px; }
        .invoice-card { background: white; max-width: 500px; margin: auto; border-top: 10px solid var(--verde); box-shadow: 0 4px 15px rgba(0,0,0,0.2); padding: 20px; border-radius: 5px; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--verde); padding-bottom: 10px; }
        .logo-text h1 { margin: 0; color: var(--oscuro); font-size: 20px; text-transform: uppercase; }
        .logo-text p { margin: 0; color: var(--verde); font-weight: bold; font-size: 12px; letter-spacing: 1px; }
        .contact-info { text-align: right; font-size: 11px; color: #555; }
        h2 { text-align: center; background: var(--oscuro); color: white; padding: 8px; font-size: 14px; margin-top: 15px; border-radius: 3px; }
        .section-title { font-weight: bold; color: var(--verde); border-bottom: 1px solid #ddd; margin-top: 15px; margin-bottom: 5px; font-size: 14px; }
        label { font-size: 12px; font-weight: bold; display: block; margin-top: 8px; }
        input, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 15px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { background: var(--verde); color: white; padding: 10px; font-size: 13px; text-align: left; }
        td { border: 1px solid #ddd; padding: 5px; }
        .total-row { background: var(--oscuro); color: white; font-weight: bold; font-size: 18px; }
        .btn-ws { background: #25d366; color: white; border: none; width: 100%; padding: 15px; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 20px; border-radius: 5px; box-shadow: 0 4px 0 #1eac53; }
        .legales { font-size: 11px; color: #777; margin-top: 15px; line-height: 1.3; text-align: center; font-style: italic; }
    </style>
</head>
<body>

<div class="invoice-card">
    <div class="header">
        <div class="logo-text">
            <h1>EZEQUIEL PALACIOS</h1>
            <p>CARPINTERÍA METÁLICA</p>
        </div>
        <div class="contact-info">
            📍 Comodoro Rivadavia<br>
            📞 154431974
        </div>
    </div>

    <h2>PRESUPUESTO DE TRABAJO</h2>

    <div class="section-title">📋 Datos del Cliente</div>
    <input type="text" id="cliente" placeholder="Nombre del cliente">

    <div class="section-title">⚙️ Detalle del Trabajo</div>
    <textarea id="descripcion" rows="2" placeholder="Ej: Reja para ventana..."></textarea>
    
    <label>Otros detalles extras:</label>
    <textarea id="otros_detalles" rows="2" placeholder="Ej: Pintura antióxido, colocación, etc."></textarea>

    <table>
        <thead>
            <tr>
                <th>Concepto</th>
                <th>Monto ($)</th>
            </tr>
        </thead>
        <tbody>
            <tr><td>Materiales</td><td><input type="number" id="mat" oninput="calc()" placeholder="0"></td></tr>
            <tr><td>Mano de obra</td><td><input type="number" id="mo" oninput="calc()" placeholder="0"></td></tr>
            <tr><td>Gastos Extras</td><td><input type="number" id="trans" oninput="calc()" placeholder="0"></td></tr>
            <tr class="total-row">
                <td style="padding: 10px;">TOTAL</td>
                <td id="total_final" style="padding: 10px; text-align: right;">$ 0</td>
            </tr>
        </tbody>
    </table>

    <div class="section-title">📍 Condiciones</div>
    <label>Tiempo estimado entrega:</label>
    <input type="text" id="tiempo" placeholder="Ej: 7 días hábiles">

    <div class="legales">
        "Este presupuesto tiene una validez de 15 días."
    </div>

    <button class="btn-ws" onclick="enviarWS()">ENVIAR POR WHATSAPP</button>
</div>

<script>
    function calc() {
        const mat = parseFloat(document.getElementById('mat').value) || 0;
        const mo = parseFloat(document.getElementById('mo').value) || 0;
        const trans = parseFloat(document.getElementById('trans').value) || 0;
        const total = mat + mo + trans;
        document.getElementById('total_final').innerText = "$ " + total.toLocaleString('es-AR');
        return total;
    }

    function enviarWS() {
        const cliente = document.getElementById('cliente').value || "Cliente";
        const desc = document.getElementById('descripcion').value || "Servicio de soldadura";
        const otros = document.getElementById('otros_detalles').value || "Ninguno";
        const mat = parseFloat(document.getElementById('mat').value) || 0;
        const mo = parseFloat(document.getElementById('mo').value) || 0;
        const trans = parseFloat(document.getElementById('trans').value) || 0;
        const total = calc();
        const tiempo = document.getElementById('tiempo').value || "A convenir";
        
        // Mensaje ultra detallado para WhatsApp
        const texto = `*PRESUPUESTO - EZEQUIEL PALACIOS*%0A` +
                      `*Carpintería Metálica*%0A%0A` +
                      `*CLIENTE:* ${cliente}%0A` +
                      `*TRABAJO:* ${desc}%0A` +
                      `*DETALLES:* ${otros}%0A%0A` +
                      `*--- DETALLE DE COSTOS ---*%0A` +
                      `- Materiales: $${mat.toLocaleString('es-AR')}%0A` +
                      `- Mano de obra: $${mo.toLocaleString('es-AR')}%0A` +
                      `- Gastos Extras: $${trans.toLocaleString('es-AR')}%0A` +
                      `*--------------------------*%0A` +
                      `*TOTAL: $${total.toLocaleString('es-AR')}*%0A` +
                      `*--------------------------*%0A%0A` +
                      `*Tiempo de entrega:* ${tiempo}%0A` +
                      `*Validez:* 15 días.%0A%0A` +
                      `*CONTACTO:*%0A` +
                      `👤 Ezequiel Palacios%0A` +
                      `📞 2974431974%0A` +
                      `📍 Comodoro Rivadavia`;
        
        window.open(`https://wa.me/?text=${texto}`, '_blank');
    }
</script>

</body>
</html>
