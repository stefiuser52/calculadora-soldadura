<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ezequiel Palacios - Presupuestos</title>
    <style>
        :root { --verde: #2d5a27; --oscuro: #1a1a1a; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #e0e0e0; margin: 0; padding: 10px; }
        
        /* Interfaz de carga */
        #interface-cliente { background: white; max-width: 500px; margin: auto; border-top: 10px solid var(--verde); box-shadow: 0 4px 15px rgba(0,0,0,0.2); padding: 20px; border-radius: 5px; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--verde); padding-bottom: 10px; }
        .logo-text h1 { margin: 0; color: var(--oscuro); font-size: 20px; text-transform: uppercase; }
        .logo-text p { margin: 0; color: var(--verde); font-weight: bold; font-size: 12px; letter-spacing: 1px; }
        .contact-info { text-align: right; font-size: 11px; color: #555; }
        h2 { text-align: center; background: var(--oscuro); color: white; padding: 8px; font-size: 14px; margin-top: 15px; border-radius: 3px; }
        .section-title { font-weight: bold; color: var(--verde); border-bottom: 1px solid #ddd; margin-top: 15px; margin-bottom: 5px; font-size: 14px; }
        label { font-size: 12px; font-weight: bold; display: block; margin-top: 8px; }
        input, textarea { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 16px; margin-bottom: 5px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { background: var(--verde); color: white; padding: 10px; font-size: 13px; text-align: left; }
        td { border: 1px solid #ddd; padding: 8px; }
        .total-row { background: var(--oscuro); color: white; font-weight: bold; font-size: 18px; }

        .contenedor-botones { max-width: 500px; margin: 20px auto; display: flex; flex-direction: column; gap: 10px; padding: 0 10px; }
        .btn { width: 100%; border: none; padding: 18px; font-weight: bold; font-size: 16px; cursor: pointer; border-radius: 5px; color: white; text-transform: uppercase; }
        .btn-ws { background: #25d366; }
        .btn-pdf { background: #007bff; }
        .legales { font-size: 11px; color: #777; margin-top: 15px; text-align: center; font-style: italic; }
    </style>
</head>
<body>

<div id="interface-cliente">
    <div class="header">
        <div class="logo-text">
            <h1>EZEQUIEL PALACIOS</h1>
            <p>CARPINTERÍA METÁLICA</p>
        </div>
        <div class="contact-info">
            📍 Comodoro Rivadavia<br>
            📞 297 4431974
        </div>
    </div>
    <h2>GENERADOR DE PRESUPUESTO</h2>
    
    <div class="section-title">📋 Datos del Cliente</div>
    <input type="text" id="cliente" placeholder="Nombre del cliente">

    <div class="section-title">⚙️ Detalle del Trabajo</div>
    <textarea id="descripcion" rows="2" placeholder="Ej: Reja para ventana..."></textarea>
    <label>Otros detalles extras:</label>
    <textarea id="otros_detalles" rows="2" placeholder="Ej: Pintura antióxido..."></textarea>

    <table>
        <thead><tr><th>Concepto</th><th>Monto ($)</th></tr></thead>
        <tbody>
            <tr><td>Materiales</td><td><input type="number" inputmode="decimal" id="mat" oninput="calc()" placeholder="0"></td></tr>
            <tr><td>Mano de obra</td><td><input type="number" inputmode="decimal" id="mo" oninput="calc()" placeholder="0"></td></tr>
            <tr><td>Gastos Extras</td><td><input type="number" inputmode="decimal" id="trans" oninput="calc()" placeholder="0"></td></tr>
            <tr class="total-row"><td>TOTAL</td><td id="total_final" style="text-align: right;">$ 0</td></tr>
        </tbody>
    </table>

    <div class="section-title">📍 Condiciones</div>
    <label>Tiempo estimado entrega:</label>
    <input type="text" id="tiempo" placeholder="Ej: 7 días hábiles">
    <div class="legales">"Válido por 15 días."</div>
</div>

<div class="contenedor-botones">
    <button class="btn btn-pdf" onclick="verPresupuesto()">Vista Previa / Imprimir</button>
    <button class="btn btn-ws" onclick="enviarWS()">Enviar por WhatsApp</button>
</div>

<script>
    function calc() {
        const mat = parseFloat(document.getElementById('mat').value) || 0;
        const mo = parseFloat(document.getElementById('mo').value) || 0;
        const trans = parseFloat(document.getElementById('trans').value) || 0;
        const total = mat + mo + trans;
        document.getElementById('total_final').innerText = "$ " + total.toLocaleString('es-AR');
        return total;
    }

    function verPresupuesto() {
        const cliente = document.getElementById('cliente').value || "---";
        const desc = document.getElementById('descripcion').value || "---";
        const otros = document.getElementById('otros_detalles').value || "---";
        const mat = (parseFloat(document.getElementById('mat').value) || 0).toLocaleString('es-AR');
        const mo = (parseFloat(document.getElementById('mo').value) || 0).toLocaleString('es-AR');
        const trans = (parseFloat(document.getElementById('trans').value) || 0).toLocaleString('es-AR');
        const total = document.getElementById('total_final').innerText;
        const tiempo = document.getElementById('tiempo').value || "A convenir";

        const contenido = `
        <html>
        <head>
            <title>Presupuesto - ${cliente}</title>
            <style>
                body { font-family: sans-serif; padding: 40px; color: #1a1a1a; }
                .border { border: 2px solid #2d5a27; padding: 20px; }
                h1 { color: #2d5a27; margin: 0; }
                .header { display: flex; justify-content: space-between; border-bottom: 4px solid #2d5a27; padding-bottom: 10px; margin-bottom: 20px; }
                table { width: 100%; border-collapse: collapse; margin-top: 20px; }
                th { background: #2d5a27; color: white; padding: 10px; text-align: left; }
                td { padding: 10px; border-bottom: 1px solid #ddd; }
                .total { background: #1a1a1a; color: white; font-weight: bold; font-size: 20px; }
                .no-print { background: #007bff; color: white; padding: 15px; text-align: center; border-radius: 5px; text-decoration: none; display: block; margin-bottom: 20px; font-weight: bold; }
                @media print { .no-print { display: none; } }
            </style>
        </head>
        <body>
            <a href="#" class="no-print" onclick="window.print()">PULSA AQUÍ PARA GUARDAR COMO PDF O IMPRIMIR</a>
            <div class="header">
                <div><h1>EZEQUIEL PALACIOS</h1><p>CARPINTERÍA METÁLICA</p></div>
                <div style="text-align:right">📍 Comodoro Rivadavia<br>📞 297 4431974</div>
            </div>
            <p><b>Cliente:</b> ${cliente}</p>
            <p><b>Trabajo:</b> ${desc}</p>
            <p><b>Detalles:</b> ${otros}</p>
            <table>
                <tr><th>Concepto</th><th style="text-align:right">Monto</th></tr>
                <tr><td>Materiales</td><td style="text-align:right">$ ${mat}</td></tr>
                <tr><td>Mano de obra</td><td style="text-align:right">$ ${mo}</td></tr>
                <tr><td>Gastos Extras</td><td style="text-align:right">$ ${trans}</td></tr>
                <tr class="total"><td>TOTAL</td><td style="text-align:right">${total}</td></tr>
            </table>
            <p style="margin-top:20px;"><b>Tiempo de entrega:</b> ${tiempo}</p>
            <p style="text-align:center; font-style:italic; margin-top:50px; border-top:1px solid #eee; padding-top:10px;">Válido por 15 días.</p>
        </body>
        </html>`;

        const win = window.open('', '_blank');
        win.document.write(contenido);
        win.document.close();
    }

    function enviarWS() {
        const cliente = document.getElementById('cliente').value || "Cliente";
        const desc = document.getElementById('descripcion').value || "Soldadura";
        const total = document.getElementById('total_final').innerText;
        const texto = `*PRESUPUESTO - EZEQUIEL PALACIOS*%0A*CLIENTE:* ${cliente}%0A*TRABAJO:* ${desc}%0A*TOTAL: ${total}*%0A%0A📞 2974431974`;
        window.open(`https://wa.me/?text=${texto}`, '_blank');
    }
</script>
</body>
</html>
